# https://docs.coderabbit.ai/guides/configure-coderabbit
language: en-US
reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - "!dist/**"
    - "!coverage/**"
    - "!**/*.lock"
    - "!**/*.lock.json"
    - "!senzu/**"
chat:
  auto_reply: true
