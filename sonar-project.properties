sonar.projectKey=leandrorojas_bulma
sonar.organization=leandrorojas
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts
sonar.exclusions=dist/**,coverage/**,node_modules/**
# cli.ts is the CLI entry point (main() + require.main bootstrap) — not unit-testable.
# The testable Commander program lives in buildProgram() and IS exercised by cli.test.ts;
# excluding only the entry-point glue from coverage measurement.
sonar.coverage.exclusions=src/cli.ts
sonar.javascript.lcov.reportPaths=coverage/lcov.info
